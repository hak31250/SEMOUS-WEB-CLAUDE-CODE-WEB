[build]
  command = "echo 'Site statique — aucun build'"
  publish = "."

[build.environment]
  NETLIFY_SKIP_FRAMEWORK_DETECTION = "1"
  NODE_ENV = "production"

# Headers sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
